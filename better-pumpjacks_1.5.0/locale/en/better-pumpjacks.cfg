[mod-setting-description]
bpj-mk2-speed=Mining speed multiplier for Pumpjack MK2 (Min=1, Max=10, Default=1.5).
bpj-mk3-speed=Mining speed multiplier for Pumpjack MK3 (Min=1, Max=20, Default=2).
bpj-mk2-productivity=Base productivity bonus for Pumpjack MK2 (Min=0, Max=1, Default=0.1).
bpj-mk3-productivity=Base productivity bonus for Pumpjack MK3 (Min=0, Max=2, Default=0.2).
bpj-mk2-modules=Module slots available in Pumpjack MK2 (Min=0, Max=20, Default=4).
bpj-mk3-modules=Module slots available in Pumpjack MK3 (Min=0, Max=20, Default=8).
bpj-mk2-pollution=Level of pollution per pump (Min=0, Max=100, Default=20).
bpj-mk3-pollution=Level of pollution per pump (Min=0, Max=100, Default=30).
bpj-productivity-research-bonus=Productivity bonus applied per pumpjack productivity research level (Min=0, Max=1, Default=0.1).
bpj-mk2-energy-usage=Energy usage for Pumpjack MK2 in kW (Min=1, Max=10000, Default=180).
bpj-mk3-energy-usage=Energy usage for Pumpjack MK3 in kW (Min=1, Max=10000, Default=300).
bpj-max-productivity-level=Maximum pumpjack productivity research level applied to entities (Min=1, Max=500, Default=50).
bpj-productivity-affects-vanilla=Whether pumpjack productivity research also affects vanilla pumpjacks.
bpj-productivity-research-base-cost=Base science pack cost for pumpjack productivity research (Min=1, Max=1000000, Default=1000).
bpj-productivity-research-level-cost=Additional science pack cost per pumpjack productivity research level (Min=0, Max=1000000, Default=1000).
bpj-warning-sampling-rate=How often Better Pumpjacks checks configured low-output warnings, in seconds (Min=5, Max=3600, Default=60). Low values scan pumpjacks more often and can cause UPS/FPS dips on large saves.
bpj-output-warnings-enabled=Whether Better Pumpjacks scans configured output thresholds and prints chat warnings. Disable this to stop warning scans entirely.
bpj-warning-repeat-rate=How often repeated chat warnings may print while output remains below threshold, in seconds (Min=5, Max=3600, Default=60).

